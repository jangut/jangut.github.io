<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>HW游戏盒子</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none;}
  body{
    min-height:100vh;display:flex;justify-content:center;align-items:center;
    background:#07070f;color:#e2e8f0;
    font-family:'Noto Sans SC',sans-serif;padding:20px;
    background:radial-gradient(ellipse at 30% 20%,#1a0a2e 0%,#07070f 60%);
  }
  .hub{width:100%;max-width:420px;}
  .hub h1{font-size:28px;font-weight:900;text-align:center;margin-bottom:6px;
    background:linear-gradient(135deg,#c084fc,#38bdf8,#fb7185);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .hub .sub{text-align:center;font-size:13px;color:#64748b;margin-bottom:24px;}

  .game-select{
    width:100%;padding:12px 16px;border-radius:12px;border:1px solid #1a1a2e;
    background:#0f0f1c;color:#e2e8f0;font-size:15px;font-weight:700;
    appearance:auto;cursor:pointer;margin-bottom:20px;font-family:inherit;
  }

  .game-card{
    display:flex;align-items:center;gap:16px;
    background:#0f0f1c;border:1px solid #1a1a2e;border-radius:16px;
    padding:18px;margin-bottom:12px;cursor:pointer;
    transition:border-color .2s,transform .1s;
  }
  .game-card:active{transform:scale(0.97);}
  .game-card .icon{font-size:40px;flex-shrink:0;}
  .game-card .info{flex:1;}
  .game-card .info h3{font-size:17px;font-weight:700;margin-bottom:2px;}
  .game-card .info p{font-size:13px;color:#64748b;}
  .game-card .arrow{font-size:18px;color:#475569;}
  .game-card:hover{border-color:#c084fc;}
</style>
</head>
<body>
<div class="hub">
  <h1>🎮 HW游戏盒子</h1>
  <p class="sub">选择一款游戏开始</p>

  <select class="game-select" id="gameSelect" onchange="if(this.value) goGame(this.value)">
    <option value="">📋 选择游戏...</option>
    <option value="2048-cake.html">🍰 合成生日蛋糕</option>
    <option value="note-slice.html">🎵 切音符 NoteSlice</option>
  </select>

  <div class="game-card" onclick="goGame('2048-cake.html')">
    <div class="icon">🍰</div>
    <div class="info"><h3>合成生日蛋糕</h3><p>2048 变种 · 甜品合成小游戏</p></div>
    <div class="arrow">›</div>
  </div>
  <div class="game-card" onclick="goGame('note-slice.html')">
    <div class="icon">🎵</div>
    <div class="info"><h3>切音符 NoteSlice</h3><p>节奏打击 · 音乐游戏</p></div>
    <div class="arrow">›</div>
  </div>
</div>
</body>
</html>
