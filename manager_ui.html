<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Blog Manager</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;background:#0a0e14;color:#f0f4f8;display:flex;height:100vh;overflow:hidden}
/* ===== Sidebar ===== */
.sidebar{width:340px;min-width:340px;background:#0f141d;border-right:1px solid #232d3b;display:flex;flex-direction:column;overflow:hidden}
.sbar-top{flex:1;overflow-y:auto;padding:8px 10px}
.sbar-bot{padding:8px 10px;border-top:1px solid #232d3b}
.tbar{display:flex;gap:6px;align-items:center;padding:6px 0;border-bottom:1px solid #232d3b;margin-bottom:6px;flex-wrap:wrap}
.tbar button{padding:4px 10px;border-radius:5px;border:1px solid #232d3b;background:#151d28;color:#9db0c3;cursor:pointer;font-size:12px;transition:.15s}
.tbar button:hover{background:#1a2535;color:#f0f4f8}
.tbar .sp{flex:1}
/* ===== Tree ===== */
#dl{font-size:13px;margin-bottom:10px}
.fld{background:#0a0e14;border:1px solid #1a2535;border-radius:6px;margin-bottom:4px}
.fh{display:flex;align-items:center;gap:5px;padding:7px 10px;cursor:pointer;border-radius:6px;transition:.1s}
.fh:hover{background:#151d28}
.fh .chev{transition:transform .2s;color:#4cf7ff;font-size:9px;flex-shrink:0}
.fh .chev.o{transform:rotate(90deg)}
.fh .fname{flex:1;border:none;background:transparent;color:#f0f4f8;font-size:13px;outline:none;padding:2px 4px;border-radius:3px;min-width:0}
.fh .fname:focus{outline:1px solid #4cf7ff;background:#151d28}
.fh .cnt{color:#667084;font-size:11px;flex-shrink:0;margin:0 4px}
.fh .del{color:#ff6b6b;opacity:.3;cursor:pointer;font-size:12px;padding:2px;flex-shrink:0}
.fh .del:hover{opacity:1}
.fb{display:none;padding:0 8px 6px 20px}
.fb.o{display:block}
.fl{display:flex;align-items:center;gap:4px;padding:4px 6px;font-size:13px;border-bottom:1px solid #151d28;cursor:pointer;border-radius:4px;transition:.1s}
.fl:hover{background:#151d28}
.fl:last-child{border:none}
.fl .prv{color:#667084;font-size:9px;flex-shrink:0;padding:2px 3px;border-radius:3px;transition:.15s}
.fl .prv:hover{color:#4cf7ff;background:rgba(76,247,255,.1)}
.fl input{flex:1;border:none;background:transparent;color:#9db0c3;font-size:13px;outline:none;padding:2px 4px;border-radius:3px;min-width:0}
.fl input:focus{outline:1px solid #4cf7ff;background:#151d28;color:#f0f4f8}
.fl select{padding:1px 4px;border-radius:3px;border:1px solid #232d3b;background:#0f141d;color:#9db0c3;font-size:11px;cursor:pointer}
.fl .del{color:#ff6b6b;opacity:.3;cursor:pointer;font-size:12px;padding:2px;flex-shrink:0}
.fl .del:hover{opacity:1}
/* ===== Library ===== */
.lib-h{font-size:12px;color:#667084;cursor:pointer;display:flex;align-items:center;gap:5px;padding:6px 0;text-transform:uppercase;letter-spacing:.06em;border-top:1px solid #232d3b;margin-top:4px}
.lib-h:hover{color:#9db0c3}
.lib-h .arr{transition:transform .2s;font-size:8px}
.lib-h .arr.o{transform:rotate(180deg)}
.lib-body{display:none;padding:4px 0;max-height:200px;overflow-y:auto}
.lib-body.o{display:block}
.lib-item{display:flex;align-items:center;gap:6px;padding:5px 8px;cursor:pointer;font-size:13px;color:#9db0c3;border-radius:4px;transition:.1s}
.lib-item:hover{background:#151d28;color:#f0f4f8}
.lib-item .tag{font-size:10px;padding:1px 6px;border-radius:3px;white-space:nowrap;flex-shrink:0}
.lib-item .tag.t{background:rgba(255,184,77,.15);color:#ffb84d}
.lib-item .tag.l{background:rgba(76,247,255,.12);color:#4cf7ff}
.lib-item .tag.i{background:rgba(255,107,107,.12);color:#ff6b6b}
.lib-item .tag.o{background:rgba(102,112,133,.12);color:#667084}
/* ===== Tags ===== */
.tags-sec h3{font-size:12px;color:#667084;margin-bottom:4px}
.tag-row{display:flex;align-items:center;gap:4px;padding:4px 0}
.tag-row input{border:none;background:transparent;color:#9db0c3;font-size:13px;outline:none;padding:2px 4px;border-radius:3px}
.tag-row input:focus{outline:1px solid #4cf7ff;background:#151d28;color:#f0f4f8}
.tag-row .inm{flex:1}
.tag-row .ini{width:40px;text-align:center}
.tag-row .del{color:#ff6b6b;opacity:.3;cursor:pointer;padding:2px}
.tag-row .del:hover{opacity:1}
/* ===== Main ===== */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:8px 16px;border-bottom:1px solid #232d3b;display:flex;gap:8px;align-items:center;flex-wrap:wrap;background:#0a0e14}
.topbar button{padding:5px 14px;border-radius:5px;border:1px solid #232d3b;background:#151d28;color:#9db0c3;cursor:pointer;font-size:12px;transition:.15s}
.topbar button:hover{background:#1a2535;color:#f0f4f8}
.topbar .sp{flex:1}
/* ===== Preview ===== */
#pv{flex:1;overflow-y:auto;padding:20px;display:none;flex-direction:column}
#pv.o{display:flex}
.ph{color:#667084;font-size:13px;padding-bottom:8px;border-bottom:1px solid #232d3b;margin-bottom:12px;flex-shrink:0}
.pb{background:#0f141d;border:1px solid #232d3b;border-radius:8px;padding:16px;font-family:monospace;font-size:13px;color:#9db0c3;white-space:pre-wrap;word-break:break-word;overflow-x:auto;flex:1;line-height:1.6;margin:0;min-height:200px}
/* ===== Toast ===== */
#tst{position:fixed;bottom:20px;right:20px;padding:10px 20px;border-radius:8px;background:#16a34a;color:#fff;font-size:13px;opacity:0;transition:opacity .3s;z-index:999;pointer-events:none}
#tst.s{opacity:1}
#tst.err{background:#dc2626}
/* ===== Buttons ===== */
.btn-p{background:rgba(76,247,255,.12)!important;border-color:rgba(76,247,255,.2)!important;color:#4cf7ff!important;font-weight:600}
.btn-p:hover{background:rgba(76,247,255,.2)!important}
/* ===== Import Modal ===== */
#imp{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:400px;max-height:60vh;background:#0f141d;border:1px solid #232d3b;border-radius:10px;z-index:1000;overflow-y:auto;padding:12px}
#imp.o{display:block}
#imp .hdr{color:#667084;font-size:12px;padding-bottom:8px;border-bottom:1px solid #232d3b;margin-bottom:8px;display:flex;justify-content:space-between}
#imp .hdr .close{color:#667084;cursor:pointer}
#imp .hdr .close:hover{color:#f0f4f8}
#imp .ii{padding:6px 10px;display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;border-radius:4px;transition:.1s}
#imp .ii:hover{background:#1a2535}
#scrim{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:999}
#scrim.o{display:block}
</style></head>
<body>

<div class="sidebar">
  <div class="sbar-top">
    <div class="tbar">
      <button onclick="af()" title="新建文件夹">+ 文件夹</button>
      <span class="sp"></span>
      <button onclick="sv()" title="保存到 index.html">💾 保存</button>
    </div>
    <div id="dl"></div>
    <div class="lib-h" onclick="this.nextElementSibling.classList.toggle('o');this.querySelector('.arr').classList.toggle('o')">
      <span class="arr o">▼</span> 📚 文件库
    </div>
    <div class="lib-body o" id="libList"></div>
  </div>
  <div class="sbar-bot">
    <div class="tags-sec">
      <h3>🏷️ 标签 &amp; 图标</h3>
      <div id="tagList"></div>
      <button class="btn btn-p" style="font-size:11px;padding:3px 10px;margin-top:4px" onclick="addTag()">+ 添加标签</button>
    </div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <button onclick="document.getElementById('fi').click()">📂 打开 .md</button>
    <input type="file" id="fi" accept=".md" style="display:none" onchange="openMd(this)">
    <span class="sp"></span>
    <button onclick="sv()" style="background:rgba(76,247,255,.12);color:#4cf7ff" title="保存到 index.html">💾 保存</button>
  </div>
  <div id="pv">
    <div class="ph" id="ph">点击左侧文件预览</div>
    <pre class="pb" id="pb">← 从文件树或文件库选择文件预览</pre>
  </div>
</div>

<div class="ts" id="tst"></div>
<div id="scrim"></div>
<div id="imp">
  <div class="hdr"><span>📥 选择文件导入到文件库</span><span class="close" onclick="hi()">✕</span></div>
  <div id="il"></div>
</div>

<script>
var T;

function ld(){fetch('/api/tree').then(function(r){return r.json()}).then(function(d){T=d;R()}).catch(function(){ts('network','加载失败')})}
function es(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function ts(type,m){var e=document.getElementById('tst');e.textContent=m||type;e.className='s'+(type==='err'?' err':'');setTimeout(function(){e.className=''},2200)}

function R(){
  var h='';
  if(!T||!T.folders){h='<div style="padding:12px;color:#667084;font-size:12px">文件树为空</div>';document.getElementById('dl').innerHTML=h;renderLibrary();renderTags();return}
  T.folders.forEach(function(f,i){
    h+='<div class="fld"><div class="fh" onclick="T.folders['+i+'].open=!T.folders['+i+'].open;R()">';
    h+='<span class="chev'+(f.open?' o':'')+'">▸</span>';
    h+='<input class="fname" value="'+es(f.name)+'" onchange="T.folders['+i+'].name=this.value" onclick="event.stopPropagation()">';
    h+='<span class="cnt">'+f.files.length+'</span>';
    h+='<span class="del" onclick="event.stopPropagation();if(confirm(\'删除文件夹?\')){T.folders.splice('+i+',1);R()}">✕</span></div>';
    h+='<div class="fb'+(f.open?' o':'')+'">';
    f.files.forEach(function(g,j){
      h+='<div class="fl" data-path="'+es(g.path)+'" data-title="'+es(g.title)+'">';
      h+='<span class="prv" onclick="event.stopPropagation();preview(this.parentElement.dataset.path,this.parentElement.dataset.title)" title="预览">▶</span>';
      h+='<input value="'+es(g.title)+'" onchange="T.folders['+i+'].files['+j+'].title=this.value" onclick="event.stopPropagation()">';
      h+='<select onchange="T.folders['+i+'].files['+j+'].cat=this.value" onclick="event.stopPropagation()">';
      (T.tags||[{name:'技术'},{name:'理论'},{name:'想法'},{name:'其他'}]).forEach(function(t){
        h+='<option'+(g.cat===t.name?' selected':'')+'>'+t.name+'</option>'
      });
      h+='</select>';
      h+='<span class="del" onclick="event.stopPropagation();T.folders['+i+'].files.splice('+j+',1);R()">✕</span></div>';
    });
    h+='<div style="padding:4px 0"><button class="btn btn-p" style="font-size:10px;padding:2px 8px" data-fi="'+i+'" onclick="event.stopPropagation();si(this)">+ 添加文件</button></div></div></div>';
  });
  h+='<div style="margin-top:6px;text-align:center"><button class="btn btn-p" onclick="af()" style="font-size:12px;padding:4px 16px">+ 新建文件夹</button></div>';
  document.getElementById('dl').innerHTML=h;
  renderLibrary();
  renderTags();
}

function renderLibrary(){
  var el=document.getElementById('libList');
  if(!el)return;
  fetch('/api/docs').then(function(r){return r.json()}).then(function(d){
    var h='';
    d.forEach(function(x){
      h+='<div class="lib-item" onclick="preview(\''+x.path+'\',\''+x.title+'\')">';
      var cls='o';if(x.cat==='技术')cls='t';else if(x.cat==='理论')cls='l';else if(x.cat==='想法')cls='i';
      h+='<span class="tag '+cls+'">'+x.cat+'</span>';
      h+=x.title+'</div>';
    });
    if(!d.length)h='<div style="padding:8px;color:#667084;font-size:11px">没有文件，点击📥导入</div>';
    el.innerHTML=h;
  }).catch(function(){el.innerHTML='<div style="padding:8px;color:#667084">加载失败</div>'});
}

function renderTags(){
  var e=document.getElementById('tagList');
  if(!e)return;
  if(!T.tags)T.tags=[{name:'技术',icon:'🔧'},{name:'理论',icon:'📘'},{name:'想法',icon:'💡'},{name:'其他',icon:'·'}];
  var h='';
  T.tags.forEach(function(t,j){
    h+='<div class="tag-row">';
    h+='<input class="inm" value="'+t.name+'" onchange="T.tags['+j+'].name=this.value" placeholder="名称">';
    h+='<input class="ini" value="'+t.icon+'" onchange="T.tags['+j+'].icon=this.value;R()" placeholder="图标">';
    h+='<span class="del" onclick="T.tags.splice('+j+',1);renderTags();R()">✕</span></div>';
  });
  e.innerHTML=h;
}

function af(){if(!T)T={folders:[]};T.folders.push({name:'新分类',open:true,files:[]});R()}

function addTag(){
  if(!T.tags)T.tags=[];
  T.tags.push({name:'新标签',icon:'📌'});
  renderTags();R();
}

function si(btn){window._fi=btn&&btn.dataset?parseInt(btn.dataset.fi):0;
  var e=document.getElementById('imp');e.classList.add('o');
  document.getElementById('scrim').classList.add('o');
  fetch('/api/docs').then(function(r){return r.json()}).then(function(d){
    var h='',il=document.getElementById('il');
    d.forEach(function(x,i){
      var cls='o';if(x.cat==='技术')cls='t';else if(x.cat==='理论')cls='l';else if(x.cat==='想法')cls='i';
      h+='<div class="ii" onclick="im('+i+')"><span class="tag '+cls+'">'+x.cat+'</span><span>'+es(x.title)+'</span></div>';
    });
    if(!d.length)h='<div style="padding:12px;color:#667084">没有文件可导入</div>';
    il.innerHTML=h;window._dx=d;
  });
}

function hi(){document.getElementById('imp').classList.remove('o');document.getElementById('scrim').classList.remove('o')}

function im(i){
  var d=window._dx[i];if(!d)return;
  if(!T||!T.folders){ts('err','树未加载');return}
  var fi=window._fi||0;var f=T.folders[fi];if(!f){ts('err','文件夹['+fi+']不存在');return}
  f.files.push({path:d.path,title:d.title,cat:d.cat});
  hi();R();ts('','已导入到['+fi+'] '+d.title);
}

function sv(){
  if(!T||!T.folders){ts('err','没有内容可保存');return}
  fetch('/api/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(T)})
  .then(function(r){return r.json()})
  .then(function(d){if(d&&d.ok)ts('','已保存到 index.html');else ts('err','保存失败')})
  .catch(function(){ts('err','网络错误')});
}

function openMd(i){
  var file=i.files[0];if(!file)return;
  var name=file.name,ext=name.split('.').pop();
  var r=new FileReader();
  r.onload=function(e){
    var t=e.target.result,title=name.replace('.'+ext,''),cat='其他';
    if(ext==='md'){
      var m=t.match(/^---\n([\s\S]*?)\n---/);
      if(m){
        var tv=m[1].match(/^title\s*:\s*(.+)$/m);
        var cv=m[1].match(/^category\s*:\s*(.+)$/m);
        if(tv)title=tv[1].trim();if(cv)cat=cv[1].trim();
      }
    }
    document.getElementById('pv').classList.add('o');
    document.getElementById('pb').textContent=t;
    document.getElementById('ph').textContent=title;
    fetch('/api/upload',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:name,content:t})})
    .then(function(r){return r.json()}).then(function(d){
      if(d&&d.ok){
        if(!T||!T.folders){ts('err','树未加载');return}
        var fi=window._fi||0;if(!T.folders[fi]){T.folders.push({name:'导入',open:true,files:[]})}T.folders[fi].files.push({path:d.path,title:title,cat:cat});
        R();
        ts('','已上传 '+title);
      }
    }).catch(function(){ts('err','上传失败')});
  };
  r.readAsText(file);
  i.value='';
}

function preview(path,title){
  if(!path||path.startsWith('<local>')){ts('err','无法预览');return;}
  document.getElementById('pv').classList.add('o');
  document.getElementById('pb').textContent='Loading...';
  document.getElementById('ph').textContent=title||path;
  fetch('/api/read/'+encodeURIComponent(path))
  .then(function(r){return r.json()})
  .then(function(d){document.getElementById('pb').textContent=d.content||'(empty)';})
  .catch(function(){document.getElementById('pb').textContent='Error loading file';});
}

// Event delegation: tree + library click to preview
document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('dl').addEventListener('click',function(e){
    var fl=e.target.closest('.fl');
    if(!fl||e.target.tagName==='INPUT'||e.target.tagName==='SELECT'||e.target.classList.contains('del'))return;
    preview(fl.dataset.path,fl.dataset.title);
  });
  document.getElementById('libList').addEventListener('click',function(e){
    var li=e.target.closest('.lib-item');if(!li)return;
    var t=li.querySelector('.tag');var cat=t?t.textContent:'其他';
    preview(li.dataset.path,li.dataset.title);
  });
  ld();
});
</script>
</body>
</html>
